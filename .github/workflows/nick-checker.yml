name: Nick Checker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'progress.json'

permissions:
  contents: write

jobs:
  check-nicks:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write proxies from secret
        if: ${{ secrets.PROXY_LIST != '' }}
        env:
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: echo "$PROXY_LIST" > proxies.txt

      - name: Show checkpoint
        run: cat progress.json 2>/dev/null || echo "{}"

      - name: Run checker
        run: python3 rare_nick_gen.py --resume
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}

      - name: Commit progress
        run: |
          git config user.name "nick-checker[bot]"
          git config user.email "nick-checker[bot]@users.noreply.github.com"
          git add progress.json found_nicks/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: checkpoint $(date -u +%H:%M)"
          git push
