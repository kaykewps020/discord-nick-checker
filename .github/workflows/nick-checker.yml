name: Nick Checker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-nicks:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest progress
        run: git pull origin main || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install aiohttp colorama

      - name: Check proxies
        run: wc -l proxies.txt

      - name: Run checker
        run: python3 rare_nick_gen.py --resume
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Final commit
        if: always()
        run: |
          git config user.name "nick-checker[bot]"
          git config user.email "nick-checker[bot]@users.noreply.github.com"
          git add progress.json found_nicks/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: final checkpoint $(date -u +%H:%M)"
          git push || true
